<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="style.css">
        <title>Image Editor</title>
    </head>
    <body>
        <div id="header" class="pres">
            <h1>Merge images</h1>
        </div>
        <div id="navbar" class="pres">
            <a href="index.html">Home Page</a>
            <a href="padding.html">Add Padding</a>
            <a href="color.html">Change Color</a>
        </div>
        <div id="main">
            <div id="render-zone">
                <div id="input-zone">
                    <label id="input-style" for="img-input">Upload Image...</label>
                    <input id="img-input" type="file" accept=".png,.jpg" multiple>
                    <img id="source-img" src="FlappyBird.png">
                </div>
                <canvas id="drawing-canvas" width="250" height="250"></canvas>
            </div>
            <div id="download-zone">
                <button id="download" onclick="download()">Download...</button>
            </div>
        </div>
        <div id="footer" class="pres">
            Image Editor by Solenrae
        </div>
    </body>
    <script src="mergeImages.js"></script>
</html>
