<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="icon" type="image/png" href="icon.png">
        <title>Image Editor</title>
    </head>
    <body>
        <div id="header" class="pres">
            <h1>Image Editor</h1>
        </div>
        <div id="main">
            <div id="mode-list">
                <p><b>Modes List:</b></p>

                <div class="mode">
                    <button class="button" id="padding-mode" onclick="changeMode('padding')">↔ Add Padding</button>
                    
                    <div class="input-group" id="p-width">
                        <label for="p-width-inp">Width:</label>
                        <input type="number" id="p-width-inp" min="0" value="15" class="nbr-inp">
                    </div>

                    <div class="input-group" id="p-height">
                        <label for="p-height-inp">Height:</label>
                        <input type="number" id="p-height-inp" min="0" value="30" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="filter-mode" onclick="changeMode('filter')">🎨 Color Filter</button>

                    <div class="input-group" id="f-color">
                        <label for="f-color-inp">Filter's Color:</label>
                        <input type="color" id="f-color-inp" value="#000000" class="clr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="replace-mode" onclick="changeMode('replace')">🔀 Replace Color</button>

                    <div class="input-group" id="r-color-1">
                        <label for="r-color-1-inp">Original:</label>
                        <input type="color" id="r-color-1-inp" value="#000000" class="clr-inp">
                    </div>

                    <div class="input-group" id="r-color-2">
                        <label for="r-color-2-inp">Replace By:</label>
                        <input type="color" id="r-color-2-inp" value="#000000" class="clr-inp">
                    </div>

                    <div class="input-group" id="r-threshold">
                        <label for="r-threshold-inp">Threshold:</label>
                        <input type="number" id="r-threshold-inp" min="0" value="50" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="merge-mode" onclick="changeMode('merge')">🖼 Merge Images</button>

                    <div class="input-group" id="m-nbr">
                        <label for="m-nbr-inp">Number of Images:</label>
                        <input type="number" id="m-nbr-inp" min="2" value="2" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="opacity-mode" onclick="changeMode('opacity')">🔍 Change Opacity</button>

                    <div class="input-group" id="o-ratio">
                        <label for="o-ratio-inp">Opacity Ratio:</label>
                        <input type="number" id="o-ratio-inp" min="-1" max="1" step="0.1" value="0.5" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="flip-mode" onclick="changeMode('flip')">🔄 Flip Image</button>

                    <div class="input-group" id="f-direction">
                        <label for="f-direction-inp">Flip Direction:</label>
                        <select id="f-direction-inp" class="sel-inp">
                            <option value="horizontal">Horizontal</option>
                            <option value="vertical">Vertical</option>
                        </select>
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="round-mode" onclick="changeMode('round')">⚪ Round Corners</button>

                    <div class="input-group" id="r-radius">
                        <label for="r-radius-inp">Radius:</label>
                        <input type="number" id="r-radius-inp" min="0" value="15" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="blur-mode" onclick="changeMode('blur')">🌫 Blur Image</button>

                    <div class="input-group" id="b-intensity">
                        <label for="b-intensity-inp">Intensity:</label>
                        <input type="number" id="b-intensity-inp" min="1" max="20" value="5" class="nbr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="ratio-mode" onclick="changeMode('ratio')">📐 Change Image Ratio</button>

                    <div class="input-group" id="r-type">
                        <label for="r-type-inp">Ratio Type:</label>
                        <select id="r-type-inp" class="sel-inp">
                            <option value="crop">Crop</option>
                            <option value="distort">Distort</option>
                            <option value="fill">Fill</option>
                        </select>
                    </div>

                    <div class="input-group" id="r-presets">
                        <label for="r-presets-inp">Presets:</label>
                        <select id="r-presets-inp" class="sel-inp">
                            <option value="1:1">1:1</option>
                            <option value="4:3">4:3</option>
                            <option value="16:9">16:9</option>
                            <option value="3:4">3:4</option>
                            <option value="9:16">9:16</option>
                        </select>
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="background-mode" onclick="changeMode('background')">👨‍🏫 Edit Background</button>

                    <div class="input-group" id="b-type">
                        <label for="b-type-inp">Edit Type:</label>
                        <select id="b-type-inp" class="sel-inp">
                            <option value="remove">Remove</option>
                            <option value="change">Change Color</option>
                            <option value="split">Split</option>
                        </select>
                    </div>

                    <div class="input-group" id="b-threshold">
                        <label for="b-threshold-inp">Threshold:</label>
                        <input type="number" id="b-threshold-inp" min="0" value="10" class="nbr-inp">
                    </div>

                    <div class="input-group" id="b-color">
                        <label for="b-color-inp">Replacement Color:</label>
                        <input type="color" id="b-color-inp" value="#000000" class="clr-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="text-mode" onclick="changeMode('text')">✍ Text</button>

                    <div class="input-group" id="t-text">
                        <label for="t-text-inp">Text Content:</label>
                        <input type="text" id="t-text-inp" placeholder="Text" class="nbr-inp">
                    </div>

                    <div class="input-group" id="t-size">
                        <label for="t-size-inp">Font Size:</label>
                        <input type="number" id="t-size-inp" min="0" value="16" class="nbr-inp">
                    </div>

                    <div class="input-group" id="t-color">
                        <label for="t-color-inp">Font Color:</label>
                        <input type="color" value="#000000" class="clr-inp" id="t-color-inp">
                    </div>
                </div>

                <div class="mode">
                    <button class="button" id="transform-mode" onclick="changeMode('transform')">📏 Transform</button>

                    <div class="input-group" id="t-type">
                        <label for="t-type-inp">Transform Type:</label>
                        <select id="t-type-inp" class="sel-inp">
                            <option value="none">None</option>
                            <option value="move">Move</option>
                            <option value="rotate">Rotate</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="main-zone">
                <div id="top-bar" class="pres">
                    <label class="button" for="img-input" id="actual-input">Upload Image...</label>
                    <input type="file" id="img-input" accept=".png, .jpg, .jped" multiple>
                    <button class="button" id="re-edit" onclick="reEdit()">Edit created image</button>
                    <button class="button" id="download" onclick="download()">Download...</button>
                    <div id="download-as-zone">
                        <label for="download-as">Download as...</label>
                        <select id="download-as" class="sel-inp">
                            <option value="png">PNG</option>
                            <option value="jpg">JPEG</option>
                            <option value="ico">ICON</option>
                        </select>
                    </div>
                </div>

                <div id="img-zone" class="pres">
                    <div id="render-zone">
                        <div id="input-zone">
                            <img id="source-img" src="Beest.png" alt="Drag & Drop or Browse for an image.">
                        </div>

                        <canvas id="drawing-canvas" width="250" height="250"></canvas>
                    </div>
                </div>

                <div id="bottom-bar" class="pres">
                    <button class="button" onclick="clearCanvas()">Clear Canvas</button>
                    <div>
                        <label for="canvas-sizing-inp">Sizing Mode:</label>
                        <select id="canvas-sizing-inp" class="sel-inp">
                            <option value="automatic">Automatic</option>
                            <option value="manual">Manual</option>
                        </select>
                    </div>

                    <div class="canvas-size-input">
                        <label for="canvas-width-inp">Canvas Width:</label>
                        <input type="numer" class="nbr-inp" id="canvas-width-inp" min="10" value="250">
                    </div>

                    <div class="canvas-size-input">
                        <label for="canvas-height-inp">Canvas Height:</label>
                        <input type="numer" class="nbr-inp" id="canvas-height-inp" min="10" value="250">
                    </div>
                </div>
            </div>

            <div id="layer-zone" class="pres">
                    <div id="modify-zone">
                        <p><b>Layers:</b></p>
                        <button class="button small" onclick="mergeLayers()">&gt;&lt;</button>
                        <button class="button small" onclick="addLayer()"><b>+</b></button>
                    </div>
                    
                    <div id="layer-display">
                    </div>
                </div>
        </div>

        <div id="footer" class="pres">
            Image Editor by Solenrae
        </div>

        <script src="main.js"></script>
    </body>
</html>
